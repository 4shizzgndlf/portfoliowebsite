<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/script.js}" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="homeContainer">

    <div class="registerCard fade-in">

        <h1>Create Account</h1>

        <p class="registerSubtitle">
            Join my portfolio website and create your own profile.
        </p>

        <form method="post" action="/register" class="registerForm">

            <div class="inputGroup">
                <label>Username</label>
                <input
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        required>
            </div>

            <div class="inputGroup">
                <label>Email</label>
                <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required>
            </div>

            <div class="inputGroup">
                <label>First Name</label>
                <input
                        type="text"
                        name="firstName"
                        placeholder="First name"
                        required>
            </div>

            <div class="inputGroup">
                <label>Last Name</label>
                <input
                        type="text"
                        name="lastName"
                        placeholder="Last name"
                        required>
            </div>

            <div class="inputGroup fullWidth">
                <label>Password</label>
                <input
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        required>
            </div>

            <button class="registerBtn fullWidth" type="submit">
                Create Account
            </button>

        </form>

        <div class="registerFooter">
            Already have an account?
            <a href="/login">Log In</a>
        </div>

    </div>

</div>

</body>
</html>
